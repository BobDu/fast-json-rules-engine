name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Lint (Node 14 API baseline) + typecheck + build once. tsdown/rolldown needs
  # Node >= 20 to build; the artifact is shared with the Node 14 compat job.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  # Layer 1 — business logic against the TypeScript source (vitest + fast-check).
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test

  # Layer 2 — verify the shipped artifact loads and runs on the oldest supported
  # Node (14). No deps: the smoke test only loads dist and exercises compile.
  compat-node14:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 14
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - run: node test/smoke-node14.js
