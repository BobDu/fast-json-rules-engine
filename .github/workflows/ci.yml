name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Lint (Node 14 API baseline) + typecheck + build once. tsdown/rolldown needs
  # Node >= 20 to build; the artifact is shared with the Node 14 compat job.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  # Layer 1 — business logic against the TypeScript source (vitest + fast-check).
  # Logic correctness is Node-version agnostic, so a single modern Node suffices
  # here (vitest 4 / rolldown also require Node >= 20); runtime compatibility for
  # the whole engines range is the dist-smoke job's job.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:coverage

  # Layer 2 — verify the shipped artifact loads and runs across the whole engines
  # range (Node 14+), including the versions vitest can't run on. No deps: the
  # smoke test only loads dist and exercises compile.
  dist-smoke:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [14, 16, 18, 20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - run: node test/smoke-node14.js
      - run: node test/smoke-node14.mjs

  # Layer 2 — the built artifact must behave identically to the source: a
  # fast-check differential of dist CJS/ESM vs the TS source, plus type-export
  # correctness (arethetypeswrong). Runs on one modern Node; it tests the build,
  # not the runtime range (dist-smoke covers that).
  dist-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:dist
