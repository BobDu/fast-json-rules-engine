name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint (Node 14 API baseline) + typecheck + build once. tsdown/rolldown needs
  # Node >= 20 to build; the artifact is shared with the Node 14 compat job.
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  # Layer 1 — business logic against the TypeScript source (vitest + fast-check).
  # Logic correctness is Node-version agnostic, so a single modern Node suffices
  # here (vitest 4 / rolldown also require Node >= 20). Coverage runs at the
  # default fuzz depth (fast, gates 100%); a second step runs tens of thousands of
  # differential cases against json-rules-engine without coverage overhead.
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:coverage
      - run: npx vitest run test/fuzz.test.ts
        env:
          FJRE_FUZZ_N: 10000

  # Layer 2 — verify the shipped artifact loads and runs across the whole engines
  # range (Node 14+), including the versions vitest can't run on. No deps: the
  # smoke test only loads dist and exercises compile.
  dist-smoke:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        node: [14, 16, 18, 20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - run: node test/dist-smoke.cjs
      - run: node test/dist-smoke.mjs

  # Layer 2 — the built artifact must behave identically to the source: a
  # fast-check differential of dist CJS/ESM vs the TS source, plus type-export
  # correctness (arethetypeswrong). Runs on one modern Node; it tests the build,
  # not the runtime range (dist-smoke covers that).
  dist-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:dist
